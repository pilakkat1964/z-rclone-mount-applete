{% if site.hierarchy_level and site.hierarchy_level > 1 %}
  <!-- Site Hierarchy Navigation -->
  <style>
    .hierarchy-nav {
      background-color: #f9f9f9;
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 0;
      margin-bottom: 20px;
    }
    .hierarchy-nav a {
      color: #0366d6;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .hierarchy-nav a:hover {
      text-decoration: underline;
    }
  </style>
  <div class="hierarchy-nav">
    {% if site.hierarchy_parent_url %}
      <a href="{{ site.hierarchy_parent_url }}" title="Navigate to parent site">
        ↑ Up to {{ site.hierarchy_parent_title | default: "Parent" }}
      </a>
    {% endif %}
  </div>
{% endif %}
